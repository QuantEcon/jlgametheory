name: Documentation

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[docs]"

    - name: Determine version path
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          VERSION="stable"
          echo "Building docs for tag: ${{ github.ref_name }}"
        else
          VERSION="latest"
          echo "Building docs for main branch"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Build documentation
      run: |
        cd docs
        sphinx-build -b html . _build/html

    - name: Deploy documentation
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: ./docs/_build/html
        destination_dir: ${{ steps.version.outputs.version }}
        # keep_files is scoped to destination_dir, so a clean publish removes
        # stale pages (e.g. for renamed/removed functions) from this version's
        # directory while leaving the other version and the root redirect intact.
        keep_files: false
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Deploy ${{ steps.version.outputs.version }} docs from ${{ github.sha }}'

    - name: Deploy redirect page
      if: steps.version.outputs.version == 'stable'
      run: |
        mkdir -p _redirect
        cat > _redirect/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
          <head>
            <meta charset="utf-8">
            <title>Redirecting to stable documentation</title>
            <meta http-equiv="refresh" content="0; URL=stable/">
            <link rel="canonical" href="stable/">
          </head>
          <body>
            <p>If you are not redirected automatically, follow this <a href="stable/">link to the stable documentation</a>.</p>
          </body>
        </html>
        EOF

    - name: Update redirect
      if: steps.version.outputs.version == 'stable'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: ./_redirect
        # This deploys to the branch root (no destination_dir), so keep_files
        # MUST stay true — a clean publish here would delete the latest/ and
        # stable/ directories.
        keep_files: true
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Update root redirect'
