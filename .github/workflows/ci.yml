name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.14']
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Set up Julia
      uses: julia-actions/setup-julia@v3
      with:
        version: "1"
    
    - name: "Cache Julia"
      uses: julia-actions/cache@v3
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"
    
    - name: Show installed dependencies
      run: python -m pip list
    
    - name: Run tests
      run: |
        pytest --cov=jlgametheory --cov-report=term-missing
    
    - name: Upload coverage to Coveralls
      if: runner.os == 'Linux'
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}

  conda-test:
    name: conda (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.14']

    steps:
    - uses: actions/checkout@v6

    - name: Set up conda
      uses: conda-incubator/setup-miniconda@v4
      with:
        miniforge-version: latest
        activate-environment: jlgametheory
        python-version: ${{ matrix.python-version }}
        channels: conda-forge
        channel-priority: strict
        conda-remove-defaults: "true"
        add-pip-as-python-dependency: false
        auto-update-conda: true

    - name: Install dependencies with conda
      run: |
        conda install -y numpy quantecon pyjuliacall pytest

    - name: Show installed dependencies
      run: |
        conda info
        conda list

    - name: Pin existing Julia executable for JuliaPkg
      run: |
        set -euxo pipefail

        command -v julia
        julia --version

        python - <<'PY'
        import os
        import pathlib
        import shutil
        import subprocess

        exe = shutil.which("julia")
        if exe is None:
            raise SystemExit("No julia executable found on PATH")

        resolved = pathlib.Path(exe).resolve()

        print(f"julia on PATH: {exe}")
        print(f"resolved julia: {resolved}")

        subprocess.run([str(resolved), "--version"], check=True)

        with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
            f.write(f"PYTHON_JULIAPKG_EXE={resolved}\n")
        PY

    - name: Initialize JuliaCall
      run: |
        python -c "from juliacall import Main as jl; print(jl.seval('VERSION'))"

    - name: Run tests
      run: |
        python -m pytest
