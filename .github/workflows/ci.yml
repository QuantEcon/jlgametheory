name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.14']
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Set up Julia
      uses: julia-actions/setup-julia@v3
      with:
        version: "1"
    
    - name: "Cache Julia"
      uses: julia-actions/cache@v3
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"
    
    - name: Show installed dependencies
      run: python -m pip list
    
    - name: Run tests
      run: |
        pytest --cov=jlgametheory --cov-report=term-missing
    
    - name: Upload coverage to Coveralls
      if: runner.os == 'Linux'
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}

  conda-test:
    name: conda (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.14']

    steps:
    - uses: actions/checkout@v6

    - name: Set up conda
      uses: conda-incubator/setup-miniconda@v4
      with:
        miniforge-version: latest
        activate-environment: jlgametheory
        python-version: ${{ matrix.python-version }}
        channels: conda-forge
        channel-priority: strict
        conda-remove-defaults: "true"
        add-pip-as-python-dependency: false
        auto-update-conda: true

    - name: Install dependencies with conda
      run: |
        conda install -y numpy quantecon pyjuliacall pytest

    - name: Show installed dependencies
      run: |
        conda info
        conda list

    - name: Run diagnostics and tests
      env:
        PYTHONFAULTHANDLER: "1"
        PYTHONUNBUFFERED: "1"
      run: |
        set -euxo pipefail

        which python
        python -VV
        python -c "import sys; print(sys.executable); print(sys.path)"

        python -c "import numpy; print('numpy ok', numpy.__version__)"
        python -c "import quantecon; print('quantecon ok', quantecon.__version__)"
        python -c "import pytest; print('pytest ok', pytest.__version__)"

        python -c "import juliapkg; print('juliapkg ok')"
        python -c "from juliacall import Main as jl; print('juliacall ok'); print(jl.seval('VERSION'))"

        python -c "import jlgametheory; print('jlgametheory import ok')"

        python -m pytest -vv -s --tb=long -ra

    - name: Run tests
      run: |
        python -m pytest
